<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style.css" />
    <script type="module" src="../global.js"></script>
    <script type="module" src="main.js"></script>
    <title>Meta</title>
</head>
<body>
    <h1>Meta</h1>
    <p>This page include stats about the code on this website</p>

    <!-- <div id="meta-selector">
        <label>
            Show commits until:
            <input type="range" min="0" max="100" value="0" id="commit-progress">
            <time id="commit-time">5:00:00</time>
        </label>
    </div> -->

    <div id="profile-stats"></div>

    <h2>Commits by time of day</h2>

    <div id="scrolly-1">
        <div id="scatter-story"></div>
        <div id="scatter-plot">
            <div id="chart"></div>

            <dl id="commit-tooltip" class="info tooltip" hidden>
                <dt>Commit</dt>
                <dd>
                    <a href="" id="commit-link" target="_blank"></a>
                </dd>

                <dt>Date</dt>
                <dd id="commit-date"></dd>
                
                <dt>Time</dt>
                <dd id="commit-time"></dd>

                <!-- <dt>Author</dt>
                <dd id="commit-author"></dd> -->

                <dt>Lines</dt>
                <dd id="commit-lines"></dd>
            </dl>

            <p id="selection-count">No commits selected</p>
            <dl id="language-breakdown" class="stats"></dl>
        </div>
    </div>
    

    <dl id="files">
    <!-- we want the following structure for each file:
        <div>
            <dt>
                <code>{file.name}</code>
            </dt>
            <dd>{file.lines.length} lines</dd>
        </div>
    -->
    </dl>

</body>
</html>
